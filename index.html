<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Something is Cooking</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
        }

        /* বিদ্যুৎ চমকানোর অ্যানিমেশন */
        @keyframes lightning {
            0%, 95%, 98%, 100% { background-color: #000; }
            96%, 99% { background-color: #ffffff; }
        }

        body {
            animation: lightning 5s infinite;
        }

        .content {
            text-align: center;
            z-index: 1;
        }

        h1 { font-size: 3rem; text-transform: uppercase; letter-spacing: 5px; }
        footer { position: absolute; bottom: 20px; font-size: 0.9rem; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="content">
        <h1>Something is cooking</h1>
    </div>
    <footer>Powered by Imran</footer>
</body>
</html>
<!-- ভিজিটর কাউন্টার -->
<div id="visitor-count" style="margin-top: 10px; font-size: 0.8rem; opacity: 0.6;">
    Total Visits: <span id="count">Loading...</span>
</div>

<script>
    fetch('https://api.countapi.xyz/hit/your-unique-site-name/visits')
        .then(response => response.json())
        .then(data => {
            document.getElementById('count').innerText = data.value;
        });
</script>
